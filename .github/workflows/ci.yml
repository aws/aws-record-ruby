name: CI

on:
  push:
    branches:
      - main     

  pull_request:
    branches:
      - main     

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        ruby: [2.7, '3.0', 3.1, 3.2, 3.3, 3.4, '4.0', jruby-9.4, jruby-10.0]

    steps:
      - name: Setup     
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}

      - uses: actions/checkout@v6

      - name: Install     
        run: |
          bundle config set --local without 'docs'
          bundle install

      - name: Test 
        run: bundle exec rake release:test

  rubocop:
    runs-on: ubuntu-latest

    steps:
      - name: Set up Ruby 4.0
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '4.0'

      - uses: actions/checkout@v6

      - name: Install gems
        run: bundle install

      - name: Rubocop
        run: bundle exec rubocop -E -S